name: Code Quality Pipeline

on:
  push:
    branches:
      - '**'
  pull_request:

jobs:
  coverage:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest coverage

      # ✅ Run tests but allow failure
      - name: Run tests with coverage (allow failure)
        run: |
          coverage run -m pytest || true

      # ✅ Always generate reports
      - name: Generate coverage reports
        run: |
          coverage report -m || true
          coverage xml

      # ✅ Always upload XML, even on failure
      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml

      # ❌ Enforce coverage threshold (fails job if <95)
      - name: Enforce coverage threshold
        run: |
          coverage report -m --fail-under=95

  ruff-check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Ruff
        run: |
          python -m pip install --upgrade pip
          pip install ruff

      - name: Run Ruff (JSON output)
        run: |
          ruff check . --format=json > ruff-report.json || true

      - name: Calculate Ruff Quality Score
        run: |
          python <<'EOF'
          import json, sys

          PENALTIES = {
              "S": 5,   # Security
              "B": 3,   # Bugs
              "E": 2,   # Errors
              "F": 2,   # Pyflakes
              "UP": 1,  # Python upgrades
              "SIM": 1, # Simplification
              "I": 1    # Imports
          }

          with open("ruff-report.json") as f:
              issues = json.load(f)

          score = 100
          for issue in issues:
              code = issue["code"]
              for prefix, penalty in PENALTIES.items():
                  if code.startswith(prefix):
                      score -= penalty
                      break
              else:
                  score -= 1

          score = max(score, 0)

          grade = (
              "A" if score >= 95 else
              "B" if score >= 90 else
              "C" if score >= 80 else
              "D" if score >= 70 else
              "F"
          )

          print(f"✅ Ruff Score: {score}")
          print(f"📊 Ruff Grade: {grade}")
          print(f"🔎 Total Issues: {len(issues)}")

          if score < 90:
              print("❌ Ruff quality gate failed (minimum score: 90)")
              sys.exit(1)
          EOF




